<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', 'SimHei', monospace;
    overflow: hidden;
    user-select: none;
  }
  .game-wrapper {
    position: relative;
    border: 4px solid #e94560;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(233,69,96,0.4), 0 0 80px rgba(233,69,96,0.15);
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #16213e;
  }
  .ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    pointer-events: none;
  }
  .ui-item {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .ui-item.enemies { color: #ff6b6b; }
  .ui-item.lives   { color: #51cf66; }
  .ui-item.level   { color: #ffd43b; }
  .start-screen, .game-over-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    z-index: 10;
  }
  .start-screen h1, .game-over-screen h1 {
    font-size: 48px;
    color: #e94560;
    text-shadow: 0 0 30px rgba(233,69,96,0.8);
    margin-bottom: 10px;
    letter-spacing: 4px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px rgba(233,69,96,0.8); }
    50% { text-shadow: 0 0 50px rgba(233,69,96,1), 0 0 80px rgba(233,69,96,0.6); }
  }
  .start-screen .subtitle {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }
  .start-screen .controls {
    color: #ccc;
    font-size: 14px;
    line-height: 2;
    margin-bottom: 30px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    padding: 20px 30px;
    border-radius: 10px;
  }
  .start-screen .controls kbd {
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.3);
    font-family: inherit;
  }
  button {
    font-family: 'Courier New', 'SimHei', monospace;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 14px 40px;
    border: 2px solid #e94560;
    background: transparent;
    color: #e94560;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  button:hover {
    background: #e94560;
    color: #1a1a2e;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transform: scale(1.05);
  }
  .start-screen .hint {
    color: #ffd43b;
    font-size: 13px;
    margin-top: 12px;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .game-over-screen .final-score {
    color: #ffd43b;
    font-size: 24px;
    margin-bottom: 30px;
  }
  .hidden { display: none !important; }
  @keyframes flashAnim {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="game-wrapper" id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div class="ui-overlay hidden" id="hud">
    <span class="ui-item enemies">👾 敌人: <span id="enemyCount">0</span></span>
    <span class="ui-item level">🏆 关卡: <span id="levelNum">1</span></span>
    <span class="ui-item lives">❤️ 生命: <span id="livesCount">3</span></span>
  </div>

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <h1>坦 克 大 战</h1>
    <p class="subtitle">T A N K &nbsp; B A T T L E</p>
    <div class="controls">
      <kbd>↑ ↓ ← →</kbd> 或 <kbd>W A S D</kbd> — 移动坦克<br>
      <kbd>空格</kbd> 或 <kbd>J</kbd> — 发射炮弹<br>
      <kbd>P</kbd> — 暂停 / 继续
    </div>
    <button id="startBtn">开 始 游 戏</button>
    <p class="hint">按 Enter 或点击按钮开始</p>
  </div>

  <!-- Game Over Screen -->
  <div class="game-over-screen hidden" id="gameOverScreen">
    <h1>游 戏 结 束</h1>
    <p class="final-score">最终得分: <span id="finalScore">0</span></p>
    <button id="restartBtn">再 来 一 局</button>
    <p class="hint" style="color:#ffd43b;font-size:13px;margin-top:12px;">按 Enter 重新开始</p>
  </div>
</div>

<script>
console.log('🎮 坦克大战 - 加载中...');

(function() {
  try {
  // ──────────────────── DOM elements ────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gameWrapper = document.getElementById('gameWrapper');
  const hud = document.getElementById('hud');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  const scoreEl = document.getElementById('enemyCount');
  const levelEl = document.getElementById('levelNum');
  const livesEl = document.getElementById('livesCount');
  const finalScoreEl = document.getElementById('finalScore');

  // ──────────────────── Constants ────────────────────
  const COLS = 26;
  const ROWS = 26;
  const CELL = 28;
  const W = COLS * CELL;
  const H = ROWS * CELL;

  canvas.width = W;
  canvas.height = H;

  const TANK_SIZE = CELL - 4;
  const BULLET_SPEED = 6;
  const PLAYER_SPEED = 2.5;
  const ENEMY_SPEED = 1.2;
  const ENEMY_SHOOT_COOLDOWN = 80;
  const PLAYER_SHOOT_COOLDOWN = 18;
  const INVINCIBLE_FRAMES = 150;

  // Directions
  const UP = 0, RIGHT = 1, DOWN = 2, LEFT = 3;

  // ──────────────────── Game State ────────────────────
  let map = [];
  let player = null;
  let enemies = [];
  let bullets = [];
  let particles = [];
  let score = 0;
  let level = 1;
  let lives = 3;
  let gameRunning = false;
  let gamePaused = false;
  let gameOver = false;
  let playerInvincible = 0;
  let spawnTimer = 0;
  let maxEnemiesOnScreen = 4;
  let totalEnemiesThisLevel = 10;
  let enemiesSpawned = 0;
  let enemiesKilled = 0;
  let lastPlayerShot = 0;
  let frameCount = 0;

  // Input
  const keys = {};

  // ──────────────────── Tank Class ────────────────────
  class Tank {
    constructor(x, y, dir, color, isPlayer = false) {
      this.x = x;
      this.y = y;
      this.dir = dir;
      this.color = color;
      this.isPlayer = isPlayer;
      this.speed = isPlayer ? PLAYER_SPEED : ENEMY_SPEED;
      this.alive = true;
      this.shootCooldown = 0;
      this.aiDirChange = 40 + Math.random() * 80;
      this.aiStuck = 0;
      this.lastX = x;
      this.lastY = y;
    }

    get centerX() { return this.x + TANK_SIZE / 2; }
    get centerY() { return this.y + TANK_SIZE / 2; }

    rect() {
      return { left: this.x, top: this.y, right: this.x + TANK_SIZE, bottom: this.y + TANK_SIZE };
    }

    collidesRect(otherRect) {
      const a = this.rect();
      return !(a.right <= otherRect.left || a.left >= otherRect.right ||
               a.bottom <= otherRect.top || a.top >= otherRect.bottom);
    }

    collidesMap() {
      const r = this.rect();
      const c1 = Math.floor(r.left / CELL);
      const c2 = Math.floor((r.right - 1) / CELL);
      const r1 = Math.floor(r.top / CELL);
      const r2 = Math.floor((r.bottom - 1) / CELL);
      for (let row = r1; row <= r2; row++) {
        for (let col = c1; col <= c2; col++) {
          if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
          if (map[row][col] > 0) return true;
        }
      }
      return false;
    }

    collidesTank(other) {
      if (!other || other === this || !other.alive) return false;
      return this.collidesRect(other.rect());
    }

    move(dx, dy) {
      this.x += dx;
      this.y += dy;
      this.x = Math.max(0, Math.min(W - TANK_SIZE, this.x));
      this.y = Math.max(0, Math.min(H - TANK_SIZE, this.y));
    }
  }

  // ──────────────────── Bullet Class ────────────────────
  class Bullet {
    constructor(x, y, dir, owner) {
      this.x = x;
      this.y = y;
      this.dir = dir;
      this.owner = owner;
      this.alive = true;
      this.size = 5;
    }
    get rect() {
      return {
        left: this.x - this.size / 2, top: this.y - this.size / 2,
        right: this.x + this.size / 2, bottom: this.y + this.size / 2,
      };
    }
    collidesRect(r) {
      return !(this.rect().right <= r.left || this.rect().left >= r.right ||
               this.rect().bottom <= r.top || this.rect().top >= r.bottom);
    }
  }

  // ──────────────────── Particle Class ────────────────────
  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.color = color;
      this.life = 20 + Math.random() * 15;
      this.maxLife = this.life;
      this.vx = (Math.random() - 0.5) * 4;
      this.vy = (Math.random() - 0.5) * 4;
      this.size = 2 + Math.random() * 4;
    }
  }

  // ──────────────────── Map Generation ────────────────────
  function generateMap() {
    map = Array.from({length: ROWS}, () => Array(COLS).fill(0));

    // Border walls
    for (let c = 0; c < COLS; c++) {
      map[0][c] = 2;
      map[ROWS - 1][c] = 2;
    }
    for (let r = 0; r < ROWS; r++) {
      map[r][0] = 2;
      map[r][COLS - 1] = 2;
    }

    const brickDensity = 0.18 + level * 0.02;
    const steelDensity = 0.04 + level * 0.01;

    for (let r = 2; r < ROWS - 2; r++) {
      for (let c = 2; c < COLS - 2; c++) {
        if (isSpawnArea(r, c)) continue;
        const rand = Math.random();
        if (rand < brickDensity) map[r][c] = 1;
        else if (rand < brickDensity + steelDensity) map[r][c] = 2;
      }
    }

    // Clear base & player spawn
    for (let r = ROWS - 4; r < ROWS - 1; r++)
      for (let c = 1; c < 4; c++)
        map[r][c] = 0;
    clearArea(ROWS - 2, Math.floor(COLS / 2), 3);
  }

  function isSpawnArea(r, c) {
    if (r <= 3 && (c <= 3 || c >= COLS - 4 || (c >= COLS / 2 - 2 && c <= COLS / 2 + 2))) return true;
    if (r >= ROWS - 4 && c >= COLS / 2 - 2 && c <= COLS / 2 + 2) return true;
    return false;
  }

  function clearArea(row, col, radius) {
    for (let r = row - radius; r <= row + radius; r++)
      for (let c = col - radius; c <= col + radius; c++)
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) map[r][c] = 0;
  }

  // ──────────────────── Spawning ────────────────────
  function getEnemySpawnPoints() {
    return [
      { x: 1 * CELL + 2, y: 1 * CELL + 2 },
      { x: (COLS / 2 - 1) * CELL + 2, y: 1 * CELL + 2 },
      { x: (COLS - 2) * CELL + 2, y: 1 * CELL + 2 },
    ];
  }

  function spawnEnemy() {
    if (enemiesSpawned >= totalEnemiesThisLevel) return false;
    const spawns = getEnemySpawnPoints().sort(() => Math.random() - 0.5);
    for (const sp of spawns) {
      const tank = new Tank(sp.x, sp.y, DOWN, getEnemyColor(), false);
      if (!tank.collidesMap()) {
        let blocked = enemies.some(e => tank.collidesTank(e));
        if (!blocked && player && tank.collidesTank(player)) blocked = true;
        if (!blocked) {
          enemies.push(tank);
          enemiesSpawned++;
          return true;
        }
      }
    }
    return false;
  }

  function getEnemyColor() {
    const colors = ['#ff6b6b', '#ff922b', '#f06595', '#cc5de8', '#4dabf7', '#20c997', '#ffd43b', '#ff8787'];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function spawnPlayer() {
    const px = Math.floor(COLS / 2) * CELL + 2;
    const py = (ROWS - 2) * CELL + 2;
    player = new Tank(px, py, UP, '#51cf66', true);
    playerInvincible = INVINCIBLE_FRAMES;
  }

  // ──────────────────── Drawing ────────────────────
  function drawMap() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = c * CELL, y = r * CELL;
        if (map[r][c] === 1) {
          // Brick
          ctx.fillStyle = '#a0522d';
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = '#d4943a';
          ctx.fillRect(x + 1, y + 1, CELL - 2, 5);
          ctx.fillRect(x + 1, y + 1, 5, CELL - 2);
          ctx.fillStyle = '#8b4513';
          ctx.fillRect(x + CELL / 2 - 1, y + 1, 2, CELL - 2);
          ctx.fillRect(x + 1, y + CELL / 2 - 1, CELL - 2, 2);
        } else if (map[r][c] === 2) {
          // Steel
          ctx.fillStyle = '#868e96';
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = '#dee2e6';
          ctx.fillRect(x + 3, y + 3, CELL - 6, CELL - 6);
          ctx.fillStyle = '#495057';
          ctx.fillRect(x + 4, y + 4, CELL - 8, CELL - 8);
        }
      }
    }
  }

  function lighten(hex) {
    const num = parseInt(hex.slice(1), 16);
    if (isNaN(num)) return hex;
    const r = Math.min(255, (num >> 16) + 50);
    const g = Math.min(255, ((num >> 8) & 0xff) + 50);
    const b = Math.min(255, (num & 0xff) + 50);
    return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
  }

  function drawTank(tank) {
    if (!tank.alive) return;
    ctx.save();
    const cx = tank.x + TANK_SIZE / 2;
    const cy = tank.y + TANK_SIZE / 2;
    ctx.translate(cx, cy);
    ctx.rotate((tank.dir * Math.PI) / 2);

    const hw = TANK_SIZE / 2;
    const hh = TANK_SIZE / 2;

    // Blink when invincible
    if (tank.isPlayer && playerInvincible > 0 && Math.floor(playerInvincible / 5) % 2 === 0) {
      ctx.globalAlpha = 0.35;
    }

    // Treads
    ctx.fillStyle = '#2d2d2d';
    ctx.fillRect(-hw, -hh, 5, TANK_SIZE);
    ctx.fillRect(hw - 5, -hh, 5, TANK_SIZE);
    ctx.fillStyle = '#444';
    for (let i = 0; i < TANK_SIZE; i += 7)
      ctx.fillRect(-hw, -hh + i, 5, 3);
    for (let i = 0; i < TANK_SIZE; i += 7)
      ctx.fillRect(hw - 5, -hh + i, 5, 3);

    // Body
    ctx.fillStyle = tank.color;
    ctx.fillRect(-hw + 5, -hh + 3, TANK_SIZE - 10, TANK_SIZE - 6);

    // Turret
    ctx.fillStyle = tank.isPlayer ? '#2f9e44' : lighten(tank.color);
    ctx.beginPath();
    ctx.arc(0, 0, hw * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Barrel
    ctx.fillStyle = tank.isPlayer ? '#1b5e20' : '#1a1a1a';
    ctx.fillRect(-2.5, -hh - 2, 5, hh + 4);
    ctx.fillStyle = '#111';
    ctx.fillRect(-2, -hh - 2, 4, 4);

    ctx.restore();
  }

  function drawBullet(b) {
    if (!b.alive) return;
    ctx.fillStyle = b.owner === 'player' ? '#ffd43b' : '#ff8787';
    ctx.shadowColor = b.owner === 'player' ? '#ffd43b' : '#ff8787';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawParticle(p) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke(); }
    for (let r = 1; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke(); }

    drawMap();

    // Draw all tanks sorted by Y
    const allTanks = [...enemies];
    if (player && player.alive) allTanks.push(player);
    allTanks.sort((a, b) => a.y - b.y);
    for (const t of allTanks) drawTank(t);

    for (const b of bullets) drawBullet(b);
    for (const p of particles) drawParticle(p);

    // Pause overlay
    if (gamePaused && !gameOver && gameRunning) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 40px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⏸ 暂停中', W / 2, H / 2);
      ctx.textAlign = 'start';
    }
  }

  // ──────────────────── Game Logic ────────────────────
  function moveTank(tank) {
    if (!tank.alive) return;

    const dx = tank.dir === LEFT ? -tank.speed : tank.dir === RIGHT ? tank.speed : 0;
    const dy = tank.dir === UP ? -tank.speed : tank.dir === DOWN ? tank.speed : 0;

    const origX = tank.x, origY = tank.y;

    // X movement
    tank.move(dx, 0);
    let blocked = tank.collidesMap();
    if (!blocked) {
      for (const e of enemies) { if (tank.collidesTank(e)) { blocked = true; break; } }
    }
    if (!blocked && tank !== player && player && player.alive && tank.collidesTank(player)) blocked = true;
    if (!blocked && tank === player) {
      for (const e of enemies) { if (tank.collidesTank(e)) { blocked = true; break; } }
    }
    if (blocked) tank.x = origX;

    // Y movement
    tank.move(0, dy);
    blocked = tank.collidesMap();
    if (!blocked) {
      for (const e of enemies) { if (tank.collidesTank(e)) { blocked = true; break; } }
    }
    if (!blocked && tank !== player && player && player.alive && tank.collidesTank(player)) blocked = true;
    if (!blocked && tank === player) {
      for (const e of enemies) { if (tank.collidesTank(e)) { blocked = true; break; } }
    }
    if (blocked) tank.y = origY;

    // Stuck detection
    if (Math.abs(tank.x - tank.lastX) < 0.05 && Math.abs(tank.y - tank.lastY) < 0.05) {
      tank.aiStuck++;
    } else {
      tank.aiStuck = 0;
    }
    tank.lastX = tank.x;
    tank.lastY = tank.y;
  }

  function shootBullet(tank, owner) {
    const cx = tank.centerX, cy = tank.centerY;
    let bx = cx, by = cy;
    const offset = TANK_SIZE / 2 + 4;
    if (tank.dir === UP) by -= offset;
    if (tank.dir === DOWN) by += offset;
    if (tank.dir === LEFT) bx -= offset;
    if (tank.dir === RIGHT) bx += offset;
    bullets.push(new Bullet(bx, by, tank.dir, owner));
  }

  function spawnExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++)
      particles.push(new Particle(x, y, color));
  }

  function updateBullets() {
    for (const bullet of bullets) {
      if (!bullet.alive) continue;

      let dx = 0, dy = 0;
      if (bullet.dir === UP) dy = -BULLET_SPEED;
      else if (bullet.dir === DOWN) dy = BULLET_SPEED;
      else if (bullet.dir === LEFT) dx = -BULLET_SPEED;
      else if (bullet.dir === RIGHT) dx = BULLET_SPEED;

      for (let s = 0; s < BULLET_SPEED; s++) {
        bullet.x += dx / BULLET_SPEED;
        bullet.y += dy / BULLET_SPEED;

        // Bounds
        if (bullet.x < 0 || bullet.x > W || bullet.y < 0 || bullet.y > H) {
          bullet.alive = false; break;
        }

        // Map hit
        const col = Math.floor(bullet.x / CELL);
        const row = Math.floor(bullet.y / CELL);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
          if (map[row][col] === 1) {
            map[row][col] = 0;
            bullet.alive = false;
            spawnExplosion(bullet.x, bullet.y, '#ff922b', 6);
            break;
          } else if (map[row][col] === 2) {
            bullet.alive = false;
            spawnExplosion(bullet.x, bullet.y, '#ced4da', 3);
            break;
          }
        }

        // Hit enemy
        if (bullet.owner === 'player') {
          for (const enemy of enemies) {
            if (!enemy.alive) continue;
            if (bullet.collidesRect(enemy.rect())) {
              enemy.alive = false;
              bullet.alive = false;
              score += 100;
              enemiesKilled++;
              spawnExplosion(enemy.centerX, enemy.centerY, enemy.color, 20);
              updateHUD();
              break;
            }
          }
          if (!bullet.alive) break;
        }

        // Hit player
        if (bullet.owner !== 'player' && player && player.alive && playerInvincible <= 0) {
          if (bullet.collidesRect(player.rect())) {
            bullet.alive = false;
            lives--;
            spawnExplosion(player.centerX, player.centerY, player.color, 25);
            updateHUD();
            if (lives <= 0) {
              player.alive = false;
              endGame();
            } else {
              spawnPlayer();
            }
            break;
          }
        }

        // Bullet vs bullet
        for (const other of bullets) {
          if (other === bullet || !other.alive) continue;
          if (bullet.owner !== other.owner &&
              Math.abs(bullet.x - other.x) < 6 && Math.abs(bullet.y - other.y) < 6) {
            bullet.alive = false;
            other.alive = false;
            spawnExplosion(bullet.x, bullet.y, '#fff', 3);
            break;
          }
        }
        if (!bullet.alive) break;
      }
    }
    bullets = bullets.filter(b => b.alive);
  }

  function enemyAI(enemy) {
    if (!enemy.alive) return;
    enemy.shootCooldown--;

    // Change direction periodically or when stuck
    enemy.aiDirChange--;
    if (enemy.aiDirChange <= 0 || enemy.aiStuck > 30) {
      enemy.dir = Math.floor(Math.random() * 4);
      enemy.aiDirChange = 50 + Math.random() * 100;
      enemy.aiStuck = 0;
    }

    // Face and shoot player if aligned
    if (player && player.alive && enemy.shootCooldown <= 0) {
      const dx = player.centerX - enemy.centerX;
      const dy = player.centerY - enemy.centerY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      let shouldShoot = false;
      if (Math.abs(dx) < 5) {
        // Vertically aligned
        enemy.dir = dy < 0 ? UP : DOWN;
        if (dist < CELL * 8) shouldShoot = true;
      } else if (Math.abs(dy) < 5) {
        // Horizontally aligned
        enemy.dir = dx < 0 ? LEFT : RIGHT;
        if (dist < CELL * 8) shouldShoot = true;
      } else if (Math.random() < 0.015) {
        shouldShoot = true;
      }

      if (shouldShoot) {
        shootBullet(enemy, enemy);
        enemy.shootCooldown = ENEMY_SHOOT_COOLDOWN + Math.random() * 30;
      }
    }

    moveTank(enemy);
  }

  function updateHUD() {
    if (scoreEl) scoreEl.textContent = enemiesKilled + '/' + totalEnemiesThisLevel;
    if (levelEl) levelEl.textContent = level;
    if (livesEl) livesEl.textContent = lives;
  }

  function checkLevelComplete() {
    if (enemiesKilled >= totalEnemiesThisLevel && enemies.length === 0) {
      level++;
      enemies = [];
      bullets = [];
      particles = [];
      enemiesSpawned = 0;
      enemiesKilled = 0;
      totalEnemiesThisLevel = 10 + (level - 1) * 5;
      maxEnemiesOnScreen = Math.min(8, 4 + level - 1);
      spawnTimer = 30;
      generateMap();
      spawnPlayer();
      updateHUD();

      // Flash effect
      try {
        const flash = document.createElement('div');
        flash.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.25);z-index:5;pointer-events:none;animation:flashAnim 0.6s ease-out forwards;';
        gameWrapper.appendChild(flash);
        setTimeout(() => { if (flash.parentNode) flash.remove(); }, 700);
      } catch (e) {}
    }
  }

  function endGame() {
    gameOver = true;
    gameRunning = false;
    gamePaused = false;
    finalScoreEl.textContent = score;
    gameOverScreen.classList.remove('hidden');
    hud.classList.add('hidden');
  }

  // ──────────────────── Main Loop ────────────────────
  function update() {
    if (!gameRunning || gamePaused || gameOver) return;

    frameCount++;

    // Player input
    if (player && player.alive) {
      let moved = false;
      if (keys['ArrowUp'] || keys['KeyW'])    { player.dir = UP; moved = true; }
      if (keys['ArrowDown'] || keys['KeyS'])  { player.dir = DOWN; moved = true; }
      if (keys['ArrowLeft'] || keys['KeyA'])  { player.dir = LEFT; moved = true; }
      if (keys['ArrowRight'] || keys['KeyD']) { player.dir = RIGHT; moved = true; }
      if (moved) moveTank(player);

      if ((keys['Space'] || keys['KeyJ']) && lastPlayerShot <= 0) {
        shootBullet(player, 'player');
        lastPlayerShot = PLAYER_SHOOT_COOLDOWN;
      }
      if (lastPlayerShot > 0) lastPlayerShot--;
      if (playerInvincible > 0) playerInvincible--;
    }

    // Enemy AI
    for (const enemy of enemies) enemyAI(enemy);

    // Spawn enemies
    spawnTimer--;
    if (spawnTimer <= 0 && enemies.length < maxEnemiesOnScreen && enemiesSpawned < totalEnemiesThisLevel) {
      spawnEnemy();
      spawnTimer = 70 + Math.random() * 60;
    }

    updateBullets();

    // Particles
    for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
    particles = particles.filter(p => p.life > 0);

    // Cleanup
    enemies = enemies.filter(e => e.alive);
    checkLevelComplete();
    updateHUD();
  }

  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // ──────────────────── Input ────────────────────
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;

    // Start game on Enter
    if (e.code === 'Enter') {
      if (!gameRunning || gameOver) {
        startGame();
        return;
      }
    }

    // Pause
    if (e.code === 'KeyP' && gameRunning && !gameOver) {
      gamePaused = !gamePaused;
      if (gamePaused) hud.classList.add('hidden');
      else hud.classList.remove('hidden');
    }

    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
      e.preventDefault();
    }
  });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  // ──────────────────── Start / Restart ────────────────────
  function resetGameState() {
    score = 0;
    level = 1;
    lives = 3;
    enemies = [];
    bullets = [];
    particles = [];
    enemiesSpawned = 0;
    enemiesKilled = 0;
    totalEnemiesThisLevel = 10;
    maxEnemiesOnScreen = 4;
    spawnTimer = 30;
    gameOver = false;
    gameRunning = true;
    gamePaused = false;
    playerInvincible = 0;
    lastPlayerShot = 0;
    frameCount = 0;
    // Clear keys
    for (const k in keys) keys[k] = false;
  }

  function startGame() {
    resetGameState();
    generateMap();
    spawnPlayer();
    playerInvincible = INVINCIBLE_FRAMES;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    updateHUD();
    console.log('🎮 游戏开始! 关卡: ' + level);
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // ──────────────────── Boot ────────────────────
  console.log('✅ 坦克大战初始化完成，画布 ' + W + 'x' + H);
  gameLoop();

  } catch (err) {
    console.error('❌ 游戏初始化错误:', err.message, err.stack);
    document.body.innerHTML = '<div style="color:red;text-align:center;padding:50px;font-size:18px;">'
      + '游戏加载失败: ' + err.message + '<br><small>请刷新页面重试</small></div>';
  }
})();
</script>
</body>
</html>

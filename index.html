<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  .game-wrapper {
    position: relative;
    border: 4px solid #e94560;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(233,69,96,0.4), 0 0 80px rgba(233,69,96,0.15);
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #16213e;
  }
  .ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    pointer-events: none;
  }
  .ui-item {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .ui-item.enemies { color: #ff6b6b; }
  .ui-item.lives   { color: #51cf66; }
  .ui-item.level   { color: #ffd43b; }
  .start-screen, .game-over-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.75);
    z-index: 10;
  }
  .start-screen h1, .game-over-screen h1 {
    font-size: 48px;
    color: #e94560;
    text-shadow: 0 0 30px rgba(233,69,96,0.8);
    margin-bottom: 10px;
    letter-spacing: 4px;
  }
  .start-screen .subtitle {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }
  .start-screen .controls {
    color: #ccc;
    font-size: 14px;
    line-height: 2;
    margin-bottom: 30px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    padding: 20px 30px;
    border-radius: 10px;
  }
  .start-screen .controls kbd {
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.3);
    font-family: inherit;
  }
  button {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 14px 40px;
    border: 2px solid #e94560;
    background: transparent;
    color: #e94560;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  button:hover {
    background: #e94560;
    color: #1a1a2e;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transform: scale(1.05);
  }
  .game-over-screen .final-score {
    color: #ffd43b;
    font-size: 24px;
    margin-bottom: 30px;
  }
  .hidden { display: none !important; }
  .explosion {
    position: absolute;
    pointer-events: none;
    animation: explode 0.4s ease-out forwards;
  }
  @keyframes explode {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }
</style>
</head>
<body>

<div class="game-wrapper" id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div class="ui-overlay" id="hud" style="display:none;">
    <span class="ui-item enemies">👾 敌人: <span id="enemyCount">0</span></span>
    <span class="ui-item level">🏆 关卡: <span id="levelNum">1</span></span>
    <span class="ui-item lives">❤️ 生命: <span id="livesCount">3</span></span>
  </div>

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <h1>坦 克 大 战</h1>
    <p class="subtitle">T A N K &nbsp; B A T T L E</p>
    <div class="controls">
      <kbd>↑ ↓ ← →</kbd> 或 <kbd>W A S D</kbd> — 移动坦克<br>
      <kbd>空格</kbd> 或 <kbd>J</kbd> — 发射炮弹<br>
      <kbd>P</kbd> — 暂停 / 继续
    </div>
    <button id="startBtn">开 始 游 戏</button>
  </div>

  <!-- Game Over Screen -->
  <div class="game-over-screen hidden" id="gameOverScreen">
    <h1>游 戏 结 束</h1>
    <p class="final-score">最终得分: <span id="finalScore">0</span></p>
    <button id="restartBtn">再 来 一 局</button>
  </div>
</div>

<script>
(function() {
  // ──────────────────── DOM elements ────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gameWrapper = document.getElementById('gameWrapper');
  const hud = document.getElementById('hud');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  const scoreEl = document.getElementById('enemyCount');
  const levelEl = document.getElementById('levelNum');
  const livesEl = document.getElementById('livesCount');
  const finalScoreEl = document.getElementById('finalScore');

  // ──────────────────── Constants ────────────────────
  const COLS = 26;
  const ROWS = 26;
  const CELL = 28;
  const W = COLS * CELL;
  const H = ROWS * CELL;

  canvas.width = W;
  canvas.height = H;

  const TANK_SIZE = CELL - 4;
  const BULLET_SPEED = 6;
  const PLAYER_SPEED = 2.5;
  const ENEMY_SPEED = 1.2;
  const ENEMY_SHOOT_COOLDOWN = 80;
  const PLAYER_SHOOT_COOLDOWN = 20;
  const INVINCIBLE_FRAMES = 120;

  // Directions
  const UP = 0, RIGHT = 1, DOWN = 2, LEFT = 3;

  // ──────────────────── Game State ────────────────────
  let map = [];           // 0=empty, 1=brick, 2=steel
  let player = null;
  let enemies = [];
  let bullets = [];
  let particles = [];
  let score = 0;
  let level = 1;
  let lives = 3;
  let gameRunning = false;
  let gamePaused = false;
  let gameOver = false;
  let playerInvincible = 0;
  let spawnQueue = [];
  let spawnTimer = 0;
  let maxEnemiesOnScreen = 4;
  let totalEnemiesThisLevel = 10;
  let enemiesSpawned = 0;
  let enemiesKilled = 0;

  // Input
  const keys = {};
  let lastPlayerShot = 0;

  // ──────────────────── Tank Class ────────────────────
  class Tank {
    constructor(x, y, dir, color, isPlayer = false) {
      this.x = x;
      this.y = y;
      this.dir = dir;
      this.color = color;
      this.isPlayer = isPlayer;
      this.speed = isPlayer ? PLAYER_SPEED : ENEMY_SPEED;
      this.alive = true;
      this.shootCooldown = 0;
      this.aiDirChange = 0;
      this.aiStuck = 0;
      this.lastX = x;
      this.lastY = y;
    }

    get centerX() { return this.x + TANK_SIZE / 2; }
    get centerY() { return this.y + TANK_SIZE / 2; }
    get col() { return Math.floor(this.centerX / CELL); }
    get row() { return Math.floor(this.centerY / CELL); }

    rect() {
      return {
        left: this.x,
        top: this.y,
        right: this.x + TANK_SIZE,
        bottom: this.y + TANK_SIZE,
      };
    }

    collides(otherRect) {
      const a = this.rect();
      return !(a.right <= otherRect.left || a.left >= otherRect.right ||
               a.bottom <= otherRect.top || a.top >= otherRect.bottom);
    }

    collidesMap() {
      const r = this.rect();
      const c1 = Math.floor(r.left / CELL);
      const c2 = Math.floor((r.right - 1) / CELL);
      const r1 = Math.floor(r.top / CELL);
      const r2 = Math.floor((r.bottom - 1) / CELL);
      for (let row = r1; row <= r2; row++) {
        for (let col = c1; col <= c2; col++) {
          if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
          if (map[row][col] > 0) return true;
        }
      }
      return false;
    }

    collidesTank(other) {
      if (other === this || !other.alive) return false;
      return this.collides(other.rect());
    }

    move(dx, dy) {
      this.x += dx;
      this.y += dy;
      // Clamp
      this.x = Math.max(0, Math.min(W - TANK_SIZE, this.x));
      this.y = Math.max(0, Math.min(H - TANK_SIZE, this.y));
    }

    faceDirection(dir) {
      this.dir = dir;
    }
  }

  // ──────────────────── Bullet Class ────────────────────
  class Bullet {
    constructor(x, y, dir, owner) {
      this.x = x;
      this.y = y;
      this.dir = dir;
      this.owner = owner; // 'player' or enemy tank ref
      this.alive = true;
      this.size = 5;
    }

    get rect() {
      return {
        left: this.x - this.size / 2,
        top: this.y - this.size / 2,
        right: this.x + this.size / 2,
        bottom: this.y + this.size / 2,
      };
    }
  }

  // ──────────────────── Particle Class ────────────────────
  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.color = color;
      this.life = 20 + Math.random() * 15;
      this.maxLife = this.life;
      this.vx = (Math.random() - 0.5) * 4;
      this.vy = (Math.random() - 0.5) * 4;
      this.size = 2 + Math.random() * 4;
    }
  }

  // ──────────────────── Map Generation ────────────────────
  function generateMap() {
    map = Array.from({length: ROWS}, () => Array(COLS).fill(0));

    // Border walls
    for (let c = 0; c < COLS; c++) {
      map[0][c] = 2;
      map[ROWS-1][c] = 2;
    }
    for (let r = 0; r < ROWS; r++) {
      map[r][0] = 2;
      map[r][COLS-1] = 2;
    }

    // Generate internal walls
    const brickDensity = 0.20 + level * 0.02;
    const steelDensity = 0.04 + level * 0.01;

    for (let r = 2; r < ROWS - 2; r++) {
      for (let c = 2; c < COLS - 2; c++) {
        // Keep spawn areas clear
        if (isSpawnArea(r, c)) continue;

        const rand = Math.random();
        if (rand < brickDensity) {
          map[r][c] = 1; // brick
        } else if (rand < brickDensity + steelDensity) {
          map[r][c] = 2; // steel
        }
      }
    }

    // Clear base area
    for (let r = ROWS - 4; r < ROWS - 1; r++) {
      for (let c = 1; c < 4; c++) {
        map[r][c] = 0;
      }
    }
    // Ensure player spawn is clear
    clearArea(ROWS - 2, Math.floor(COLS / 2));
  }

  function isSpawnArea(r, c) {
    // Top enemy spawn areas
    if (r <= 3 && (c <= 3 || c >= COLS - 4 || (c >= COLS/2 - 2 && c <= COLS/2 + 2))) return true;
    // Player spawn area (bottom center)
    if (r >= ROWS - 4 && c >= COLS/2 - 2 && c <= COLS/2 + 2) return true;
    return false;
  }

  function clearArea(row, col, radius = 2) {
    for (let r = row - radius; r <= row + radius; r++) {
      for (let c = col - radius; c <= col + radius; c++) {
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          map[r][c] = 0;
        }
      }
    }
  }

  // ──────────────────── Spawning ────────────────────
  function getEnemySpawnPoints() {
    return [
      { x: 1 * CELL + 2, y: 1 * CELL + 2 },
      { x: (COLS/2 - 1) * CELL + 2, y: 1 * CELL + 2 },
      { x: (COLS - 2) * CELL + 2, y: 1 * CELL + 2 },
    ];
  }

  function spawnEnemy() {
    if (enemiesSpawned >= totalEnemiesThisLevel) return;
    const spawns = getEnemySpawnPoints();
    // Pick a random spawn that's clear
    const shuffled = spawns.sort(() => Math.random() - 0.5);
    for (const sp of shuffled) {
      const tank = new Tank(sp.x, sp.y, DOWN, getEnemyColor(), false);
      if (!tank.collidesMap()) {
        let blocked = false;
        for (const e of enemies) {
          if (tank.collidesTank(e)) { blocked = true; break; }
        }
        if (player && tank.collidesTank(player)) blocked = true;
        if (!blocked) {
          enemies.push(tank);
          enemiesSpawned++;
          return;
        }
      }
    }
  }

  function getEnemyColor() {
    const colors = ['#ff6b6b', '#ff922b', '#f06595', '#cc5de8', '#4dabf7', '#20c997'];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function spawnPlayer() {
    const px = Math.floor(COLS / 2) * CELL + 2;
    const py = (ROWS - 2) * CELL + 2;
    player = new Tank(px, py, UP, '#51cf66', true);
    playerInvincible = INVINCIBLE_FRAMES;
  }

  // ──────────────────── Draw ────────────────────
  function drawMap() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = c * CELL, y = r * CELL;
        if (map[r][c] === 1) {
          // Brick
          ctx.fillStyle = '#c77826';
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = '#e09f3e';
          ctx.fillRect(x + 1, y + 1, CELL - 2, 4);
          ctx.fillRect(x + 1, y + 1, 4, CELL - 2);
          // Brick lines
          ctx.fillStyle = '#8b5a2b';
          ctx.fillRect(x + CELL/2, y + 1, 1, CELL - 2);
          ctx.fillRect(x + 1, y + CELL/2, CELL - 2, 1);
        } else if (map[r][c] === 2) {
          // Steel
          ctx.fillStyle = '#adb5bd';
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = '#ced4da';
          ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
          ctx.fillStyle = '#495057';
          ctx.fillRect(x + 3, y + 3, CELL - 6, CELL - 6);
        }
      }
    }
  }

  function drawTank(tank) {
    ctx.save();
    const cx = tank.x + TANK_SIZE / 2;
    const cy = tank.y + TANK_SIZE / 2;
    ctx.translate(cx, cy);
    ctx.rotate((tank.dir * Math.PI) / 2);

    const hw = TANK_SIZE / 2;
    const hh = TANK_SIZE / 2;

    // Blinking when invincible
    if (tank.isPlayer && playerInvincible > 0 && Math.floor(playerInvincible / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Tank body
    ctx.fillStyle = tank.color;
    ctx.fillRect(-hw + 2, -hh + 2, TANK_SIZE - 4, TANK_SIZE - 4);

    // Treads
    ctx.fillStyle = '#333';
    ctx.fillRect(-hw, -hh, 5, TANK_SIZE);       // left tread
    ctx.fillRect(hw - 5, -hh, 5, TANK_SIZE);    // right tread

    // Tread marks
    ctx.fillStyle = '#555';
    for (let i = 0; i < TANK_SIZE; i += 6) {
      ctx.fillRect(-hw, -hh + i, 5, 3);
      ctx.fillRect(hw - 5, -hh + i, 5, 3);
    }

    // Turret
    const turretColor = tank.isPlayer ? '#2f9e44' : lighten(tank.color, 0.3);
    ctx.fillStyle = turretColor;
    ctx.beginPath();
    ctx.arc(0, 0, hw * 0.55, 0, Math.PI * 2);
    ctx.fill();

    // Barrel
    ctx.fillStyle = tank.isPlayer ? '#1b5e20' : '#222';
    ctx.fillRect(-3, -hh - 2, 6, hh + 4);

    // Barrel tip
    ctx.fillStyle = '#111';
    ctx.fillRect(-2, -hh - 2, 4, 5);

    ctx.restore();
  }

  function lighten(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    let r = Math.min(255, (num >> 16) + 60);
    let g = Math.min(255, ((num >> 8) & 0xff) + 60);
    let b = Math.min(255, (num & 0xff) + 60);
    return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
  }

  function drawBullet(bullet) {
    ctx.fillStyle = bullet.owner === 'player' ? '#ffd43b' : '#ff8787';
    ctx.shadowColor = bullet.owner === 'player' ? '#ffd43b' : '#ff8787';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(bullet.x, bullet.y, bullet.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Trail
    ctx.fillStyle = bullet.owner === 'player' ? 'rgba(255,212,59,0.5)' : 'rgba(255,135,135,0.5)';
    ctx.beginPath();
    ctx.arc(bullet.x, bullet.y, bullet.size / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawParticle(p) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    // Grid background
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * CELL, 0);
      ctx.lineTo(c * CELL, H);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * CELL);
      ctx.lineTo(W, r * CELL);
      ctx.stroke();
    }

    drawMap();

    // Sort tanks by y for depth
    const allTanks = [...enemies];
    if (player && player.alive) allTanks.push(player);
    allTanks.sort((a, b) => a.y - b.y);
    for (const t of allTanks) {
      if (t.alive) drawTank(t);
    }

    for (const b of bullets) {
      if (b.alive) drawBullet(b);
    }
    for (const p of particles) {
      drawParticle(p);
    }

    // Pause overlay
    if (gamePaused && !gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 40px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText('⏸ 暂 停', W/2, H/2);
      ctx.textAlign = 'start';
    }
  }

  // ──────────────────── Update ────────────────────
  function moveTank(tank) {
    if (!tank.alive) return;

    let dx = 0, dy = 0;
    if (tank.dir === UP) dy = -tank.speed;
    if (tank.dir === DOWN) dy = tank.speed;
    if (tank.dir === LEFT) dx = -tank.speed;
    if (tank.dir === RIGHT) dx = tank.speed;

    // Try X then Y (slide along walls)
    const origX = tank.x;
    const origY = tank.y;

    tank.move(dx, 0);
    if (tank.collidesMap() || enemies.some(e => e !== tank && e.alive && tank.collidesTank(e)) ||
        (tank !== player && player && player.alive && tank.collidesTank(player)) ||
        (tank === player && enemies.some(e => e.alive && tank.collidesTank(e)))) {
      tank.x = origX;
    }

    tank.move(0, dy);
    if (tank.collidesMap() || enemies.some(e => e !== tank && e.alive && tank.collidesTank(e)) ||
        (tank !== player && player && player.alive && tank.collidesTank(player)) ||
        (tank === player && enemies.some(e => e.alive && tank.collidesTank(e)))) {
      tank.y = origY;
    }

    // Stuck detection for AI
    if (Math.abs(tank.x - tank.lastX) < 0.1 && Math.abs(tank.y - tank.lastY) < 0.1) {
      tank.aiStuck++;
    } else {
      tank.aiStuck = 0;
    }
    tank.lastX = tank.x;
    tank.lastY = tank.y;
  }

  function shootBullet(tank, owner) {
    const cx = tank.centerX;
    const cy = tank.centerY;
    let bx = cx, by = cy;
    const offset = TANK_SIZE / 2 + 4;
    if (tank.dir === UP) by -= offset;
    if (tank.dir === DOWN) by += offset;
    if (tank.dir === LEFT) bx -= offset;
    if (tank.dir === RIGHT) bx += offset;
    bullets.push(new Bullet(bx, by, tank.dir, owner));
  }

  function updateBullets() {
    for (const bullet of bullets) {
      if (!bullet.alive) continue;

      let dx = 0, dy = 0;
      if (bullet.dir === UP) dy = -BULLET_SPEED;
      if (bullet.dir === DOWN) dy = BULLET_SPEED;
      if (bullet.dir === LEFT) dx = -BULLET_SPEED;
      if (bullet.dir === RIGHT) dx = BULLET_SPEED;

      // Step the bullet in small increments for precise collision
      const steps = BULLET_SPEED;
      for (let s = 0; s < steps; s++) {
        bullet.x += dx / steps;
        bullet.y += dy / steps;

        // Out of bounds
        if (bullet.x < 0 || bullet.x > W || bullet.y < 0 || bullet.y > H) {
          bullet.alive = false;
          break;
        }

        // Map collision
        const col = Math.floor(bullet.x / CELL);
        const row = Math.floor(bullet.y / CELL);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
          if (map[row][col] === 1) {
            // Destroy brick
            map[row][col] = 0;
            bullet.alive = false;
            spawnExplosion(bullet.x, bullet.y, '#ff922b', 8);
            break;
          } else if (map[row][col] === 2) {
            // Steel blocks bullet
            bullet.alive = false;
            spawnExplosion(bullet.x, bullet.y, '#adb5bd', 5);
            break;
          }
        }

        // Hit enemy tank
        if (bullet.owner === 'player') {
          for (const enemy of enemies) {
            if (!enemy.alive) continue;
            if (bullet.collides(enemy.rect())) {
              enemy.alive = false;
              bullet.alive = false;
              score += 100;
              enemiesKilled++;
              spawnExplosion(enemy.centerX, enemy.centerY, enemy.color, 20);
              updateHUD();
              break;
            }
          }
        }

        // Hit player tank
        if (bullet.owner !== 'player' && player && player.alive && playerInvincible <= 0) {
          if (bullet.collides(player.rect())) {
            bullet.alive = false;
            lives--;
            spawnExplosion(player.centerX, player.centerY, player.color, 25);
            updateHUD();
            if (lives <= 0) {
              player.alive = false;
              endGame(false);
            } else {
              // Respawn player
              spawnPlayer();
              playerInvincible = INVINCIBLE_FRAMES;
            }
            break;
          }
        }

        // Bullet vs bullet (cancel each other)
        for (const other of bullets) {
          if (other === bullet || !other.alive) continue;
          if (bullet.owner !== other.owner &&
              Math.abs(bullet.x - other.x) < 6 &&
              Math.abs(bullet.y - other.y) < 6) {
            bullet.alive = false;
            other.alive = false;
            spawnExplosion(bullet.x, bullet.y, '#fff', 4);
          }
        }

        if (!bullet.alive) break;
      }
    }

    // Cleanup
    bullets = bullets.filter(b => b.alive);
  }

  function spawnExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, color));
    }
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function enemyAI(enemy) {
    if (!enemy.alive) return;

    enemy.shootCooldown--;

    // Change direction randomly or when stuck
    enemy.aiDirChange--;
    if (enemy.aiDirChange <= 0 || enemy.aiStuck > 40) {
      enemy.dir = Math.floor(Math.random() * 4);
      enemy.aiDirChange = 40 + Math.random() * 80;
      enemy.aiStuck = 0;
    }

    // Shoot if facing player
    if (player && player.alive && enemy.shootCooldown <= 0) {
      const dx = player.centerX - enemy.centerX;
      const dy = player.centerY - enemy.centerY;
      let shouldShoot = false;

      if (Math.abs(dx) < CELL * 2 && enemy.dir === (dx > 0 ? RIGHT : LEFT)) shouldShoot = true;
      if (Math.abs(dy) < CELL * 2 && enemy.dir === (dy > 0 ? DOWN : UP)) shouldShoot = true;
      // Random chance to shoot
      if (Math.random() < 0.02) shouldShoot = true;

      if (shouldShoot) {
        shootBullet(enemy, enemy);
        enemy.shootCooldown = ENEMY_SHOOT_COOLDOWN;
      }
    }

    moveTank(enemy);
  }

  function updateHUD() {
    scoreEl.textContent = enemiesKilled + '/' + totalEnemiesThisLevel;
    levelEl.textContent = level;
    livesEl.textContent = lives;
  }

  function checkLevelComplete() {
    if (enemiesKilled >= totalEnemiesThisLevel && enemies.length === 0) {
      // Level complete!
      level++;
      enemies = [];
      bullets = [];
      spawnQueue = [];
      enemiesSpawned = 0;
      enemiesKilled = 0;
      totalEnemiesThisLevel = 10 + (level - 1) * 5;
      maxEnemiesOnScreen = Math.min(8, 4 + level - 1);
      generateMap();
      spawnPlayer();
      playerInvincible = INVINCIBLE_FRAMES;
      updateHUD();

      // Flash effect
      showLevelFlash();
    }
  }

  function showLevelFlash() {
    // Simple flash via a quick overlay
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:absolute;top:0;left:0;right:0;bottom:0;
      background:rgba(255,255,255,0.3);z-index:5;pointer-events:none;
      animation: flashAnim 0.6s ease-out forwards;
    `;
    gameWrapper.appendChild(flash);
    setTimeout(() => flash.remove(), 600);
  }

  function endGame(won) {
    gameOver = true;
    gameRunning = false;
    finalScoreEl.textContent = score;
    gameOverScreen.classList.remove('hidden');
    hud.style.display = 'none';
  }

  // ──────────────────── Game Loop ────────────────────
  function update() {
    if (!gameRunning || gamePaused || gameOver) return;

    // Player input
    if (player && player.alive) {
      let moved = false;
      if (keys['ArrowUp'] || keys['KeyW'])    { player.faceDirection(UP); moved = true; }
      if (keys['ArrowDown'] || keys['KeyS'])  { player.faceDirection(DOWN); moved = true; }
      if (keys['ArrowLeft'] || keys['KeyA'])  { player.faceDirection(LEFT); moved = true; }
      if (keys['ArrowRight'] || keys['KeyD']) { player.faceDirection(RIGHT); moved = true; }
      if (moved) moveTank(player);

      // Shoot
      if ((keys['Space'] || keys['KeyJ']) && lastPlayerShot <= 0) {
        shootBullet(player, 'player');
        lastPlayerShot = PLAYER_SHOOT_COOLDOWN;
      }
      lastPlayerShot--;

      if (playerInvincible > 0) playerInvincible--;
    }

    // Enemy AI
    for (const enemy of enemies) {
      enemyAI(enemy);
    }

    // Spawn enemies
    spawnTimer--;
    if (spawnTimer <= 0 && enemies.length < maxEnemiesOnScreen && enemiesSpawned < totalEnemiesThisLevel) {
      spawnEnemy();
      spawnTimer = 60 + Math.random() * 60;
    }

    // Update bullets & particles
    updateBullets();
    updateParticles();

    // Cleanup dead enemies
    enemies = enemies.filter(e => e.alive);

    // Check win condition
    checkLevelComplete();

    // Update HUD
    updateHUD();
  }

  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // ──────────────────── Input Handling ────────────────────
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;

    if (e.code === 'KeyP' && gameRunning && !gameOver) {
      gamePaused = !gamePaused;
      hud.style.display = gamePaused ? 'none' : 'flex';
    }

    // Prevent scrolling
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
      e.preventDefault();
    }
  });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  // ──────────────────── Start / Restart ────────────────────
  function initGame() {
    score = 0;
    level = 1;
    lives = 3;
    enemies = [];
    bullets = [];
    particles = [];
    enemiesSpawned = 0;
    enemiesKilled = 0;
    totalEnemiesThisLevel = 10;
    maxEnemiesOnScreen = 4;
    spawnTimer = 30;
    gameOver = false;
    gameRunning = true;
    gamePaused = false;

    generateMap();
    spawnPlayer();
    updateHUD();
  }

  startBtn.addEventListener('click', () => {
    initGame();
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hud.style.display = 'flex';
  });

  restartBtn.addEventListener('click', () => {
    initGame();
    gameOverScreen.classList.add('hidden');
    hud.style.display = 'flex';
  });

  // ──────────────────── Boot ────────────────────
  // Add flash animation style
  const flashStyle = document.createElement('style');
  flashStyle.textContent = `
    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  `;
  document.head.appendChild(flashStyle);

  // Start the render loop immediately (shows the start screen)
  gameLoop();
})();
</script>
</body>
</html>
